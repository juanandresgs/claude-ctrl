[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# cli.py and test files use sys.path.insert before imports (needed for module discovery)
"runtime/cli.py" = ["E402"]
"tests/runtime/test_*.py" = ["E402"]
"tests/runtime/policies/*.py" = ["E402"]
"sidecars/**/*.py" = ["E402"]

[tool.pytest.ini_options]
addopts = "--strict-markers"
testpaths = ["tests"]
markers = [
    "fast: fast-feedback Python tests",
    "slow: slower Python integration tests",
]
