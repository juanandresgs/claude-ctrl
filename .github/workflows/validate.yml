name: Validate Hooks

on:
  pull_request:
    branches: [main]

jobs:
  validate-json:
    name: Validate settings.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate settings.json
        run: python3 -m json.tool settings.json > /dev/null

  shellcheck:
    name: Lint hook scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck on hooks
        run: |
          failed=0
          for script in hooks/*.sh; do
            echo "--- Checking $script ---"
            if ! shellcheck -e SC2034,SC1091,SC2002,SC2012,SC2015,SC2126,SC2317,SC2329 "$script"; then
              failed=1
            fi
          done
          exit $failed
      - name: Run shellcheck on tests and scripts
        run: |
          # Tests and scripts have broader exclusions:
          # SC2034,SC1091 — sourced vars, unused setup vars
          # SC2155,SC2086,SC2129 — local+assign, word-splitting, redirect style
          # SC2011,SC2016,SC2030,SC2031,SC2010,SC2005 — ls/grep patterns (test idioms)
          # SC1007,SC2153 — empty var assignment, possible misspelling
          # SC2064,SC2329 — trap quoting, unused helper functions in test suites
          # SC1090,SC2188,SC2320,SC2162,SC2045 — dynamic source, bare redirect, exit code
          # SC2001,SC2088,SC2015,SC2105,SC2012,SC2126,SC2295 — style/idiom warnings
          # SC2164 — cd without || exit (test scripts use bare cd intentionally with set -e)
          failed=0
          for script in tests/*.sh tests/lib/*.sh scripts/*.sh; do
            [ -f "$script" ] || continue
            echo "--- Checking $script ---"
            if ! shellcheck \
              -e SC2034,SC1091,SC2155,SC2011,SC2016,SC2030,SC2031,SC2010,SC2005,SC1007 \
              -e SC2153,SC2064,SC2329,SC2086,SC1090,SC2129,SC2320,SC2188,SC2015,SC2162 \
              -e SC2045,SC2001,SC2088,SC2012,SC2105,SC2126,SC2295,SC2002,SC2317,SC2164 \
              "$script"; then
              failed=1
            fi
          done
          exit $failed

  hook-contracts:
    name: Validate hook contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Run hook contract tests
        run: bash tests/run-hooks.sh
      - name: Run standalone test suites
        if: always()
        run: |
          # Auto-discover all standalone test files (deterministic sort order)
          failed=0
          while IFS= read -r test; do
            echo "--- Running $(basename "$test") ---"
            if ! bash "$test"; then
              echo "FAILED: $test"
              failed=1
            fi
          done < <(find tests/ -maxdepth 1 \( -name 'test-*.sh' -o -name 'test_*.sh' \) | sort)
          exit $failed
