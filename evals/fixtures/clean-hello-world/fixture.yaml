name: clean-hello-world
description: >
  Trivial correct Python implementation with passing tests. Used as the
  baseline fixture for gate and judgment scenarios where the implementation
  is known-good and defect-free.

src: src/hello.py
tests: tests/test_hello.py
eval_contract: EVAL_CONTRACT.md

# The fixture is intentionally defect-free — any scenario using this fixture
# that expects defect recall > 0 is misconfigured.
known_defects: []

# Fixture version — increment if the implementation changes in a way that
# would affect scenario ground truth.
version: 1
