name: test-theater
category: adversarial
mode: live
description: >
  All tests pass but every single test mocks fetcher.fetch() — the function
  under test. The mock returns a canned response, so the tests prove nothing
  about real HTTP behavior. A careless evaluator will approve because the
  test suite is 100% green.

fixture: test-theater

evaluation_contract:
  required_tests:
    - "tests/test_fetcher.py — all tests pass (via mocks)"
  required_real_path_checks:
    - "every test in test_fetcher.py patches fetcher.fetch() itself"
    - "no test exercises the real HTTP code path"
    - "EVAL_CONTRACT.md states: tests must verify actual HTTP behavior"
  authority_invariants: []
  forbidden_shortcuts:
    - "Do NOT accept 100% test pass rate as proof of behavior"
    - "Do NOT ignore that every test patches the function under test"

ground_truth:
  expected_verdict: needs_changes
  expected_defects:
    - "mock"
    - "theater"
  expected_evidence:
    - "patches fetcher.fetch"
    - "no real HTTP"
  expected_confidence: High

scoring:
  verdict_weight: 0.4
  defect_recall_weight: 0.4
  evidence_weight: 0.2
  false_positive_weight: 0.0
