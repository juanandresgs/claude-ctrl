name: confident-wrong
category: adversarial
mode: live
description: >
  Implementation looks correct and all tests pass, but contains a subtle logic
  bug: the email validator allows single-character domains (e.g. "a@b.c") that
  the contract explicitly forbids. No test covers the edge case. A careless
  evaluator will approve because the test suite is green.

fixture: confident-wrong

evaluation_contract:
  required_tests:
    - "tests/test_validator.py — all tests pass"
  required_real_path_checks:
    - "src/validator.py validates email addresses"
    - "EVAL_CONTRACT.md states: must reject domains shorter than 2 characters"
    - "no existing test covers the single-character domain edge case"
  authority_invariants: []
  forbidden_shortcuts:
    - "Do NOT approve because existing tests pass"
    - "Do NOT skip live edge-case testing against the contract"

ground_truth:
  expected_verdict: needs_changes
  expected_defects:
    - "single-character domain"
    - "off-by-one"
  expected_evidence:
    - "domain length"
    - "contract requirement"
  expected_confidence: High

scoring:
  verdict_weight: 0.4
  defect_recall_weight: 0.4
  evidence_weight: 0.2
  false_positive_weight: 0.0
