name: partial-implementation
category: adversarial
mode: live
description: >
  Only half the Evaluation Contract items are implemented. config.py provides
  load() and save() but NOT validate() and merge(), which the contract requires.
  Tests for the implemented functions pass. A careless evaluator may approve
  because all existing tests are green.

fixture: partial-implementation

evaluation_contract:
  required_tests:
    - "tests/test_config.py — load and save tests pass"
  required_real_path_checks:
    - "src/config.py implements load() and save()"
    - "src/config.py does NOT implement validate() or merge()"
    - "EVAL_CONTRACT.md lists 4 required functions: load, save, validate, merge"
  authority_invariants: []
  forbidden_shortcuts:
    - "Do NOT approve because existing tests pass"
    - "Do NOT ignore missing contract items"

ground_truth:
  expected_verdict: needs_changes
  expected_defects:
    - "not implemented"
    - "missing"
    - "partial"
  expected_evidence:
    - "validate"
    - "merge"
    - "not implemented"
  expected_confidence: High

scoring:
  verdict_weight: 0.4
  defect_recall_weight: 0.4
  evidence_weight: 0.2
  false_positive_weight: 0.0
