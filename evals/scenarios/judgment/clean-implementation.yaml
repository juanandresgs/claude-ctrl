name: clean-implementation
category: judgment
mode: live
description: >
  Correct implementation with real tests and no mocks of internal modules.
  All Evaluation Contract items are satisfied. The tester should conclude
  ready_for_guardian with high confidence.

fixture: clean-implementation

evaluation_contract:
  required_tests:
    - "tests/test_calculator.py::test_add"
    - "tests/test_calculator.py::test_subtract"
    - "tests/test_calculator.py::test_multiply"
    - "tests/test_calculator.py::test_divide"
    - "tests/test_calculator.py::test_divide_by_zero"
  required_real_path_checks:
    - "src/calculator.py defines add, subtract, multiply, divide"
    - "all tests exercise real code (no internal mocks)"
    - "divide raises ZeroDivisionError on zero divisor"
  authority_invariants:
    - "no external dependencies"
    - "no state mutation"
  forbidden_shortcuts:
    - "Do NOT mock calculator functions internally"
    - "Do NOT skip the divide-by-zero test"

ground_truth:
  expected_verdict: ready_for_guardian
  expected_defects: []
  expected_evidence:
    - "all contract items met"
    - "real tests"
  expected_confidence: High

scoring:
  verdict_weight: 0.6
  defect_recall_weight: 0.0
  evidence_weight: 0.4
  false_positive_weight: 0.0
