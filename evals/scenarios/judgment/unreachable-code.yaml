name: unreachable-code
category: judgment
mode: live
description: >
  A new module (src/orphan.py) is never imported or called from any entry
  point. Tests for orphan.py pass but the module is dead code. The tester
  must flag that new code is unreachable from the application entry point.

fixture: unreachable-code

evaluation_contract:
  required_tests:
    - "tests/test_orphan.py — all tests pass"
  required_real_path_checks:
    - "src/main.py imports src/utils.py but NOT src/orphan.py"
    - "src/orphan.py is not imported from any module"
    - "EVAL_CONTRACT.md states new code must be reachable from entry points"
  authority_invariants: []
  forbidden_shortcuts:
    - "Do NOT accept passing tests as proof of reachability"
    - "Do NOT skip the entry-point reachability check"

ground_truth:
  expected_verdict: needs_changes
  expected_defects:
    - "unreachable"
    - "dead code"
    - "not imported"
  expected_evidence:
    - "orphan.py is not imported"
    - "main.py"
  expected_confidence: High

scoring:
  verdict_weight: 0.5
  defect_recall_weight: 0.3
  evidence_weight: 0.2
  false_positive_weight: 0.0
