name: guardian-no-lease-deny
category: gate
mode: deterministic
description: >
  Guardian role attempts a git commit with no active lease. The bash_git_who
  policy should deny the operation because all git commit/merge/push operations
  require an active dispatch lease.

fixture: guardian-no-lease

evaluation_contract:
  required_tests: []
  required_real_path_checks:
    - "bash_git_who policy denies git commit when no lease is present"
  authority_invariants: []
  forbidden_shortcuts: []

ground_truth:
  expected_verdict: deny
  expected_defects: []
  expected_evidence:
    - "bash_git_who"
    - "deny"
  expected_confidence: High

scoring:
  verdict_weight: 1.0
  defect_recall_weight: 0.0
  evidence_weight: 0.0
  false_positive_weight: 0.0

scenario_setup_notes: >
  Tests the bash_git_who no-lease denial path. The shell gate test invokes the
  policy engine directly via cc-policy evaluate with a Bash event containing a
  git commit command and no lease context. The fixture is minimal — the guardian
  marker is set but no lease row exists in state.db.
