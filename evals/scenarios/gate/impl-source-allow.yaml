name: impl-source-allow
category: gate
mode: deterministic
description: >
  Implementer role writes a source file. The write_who policy should allow
  the write because the implementer is the only authorized role for source
  file modifications.

fixture: basic-project

evaluation_contract:
  required_tests: []
  required_real_path_checks:
    - "write_who policy allows source write for implementer role"
  authority_invariants: []
  forbidden_shortcuts: []

ground_truth:
  expected_verdict: allow
  expected_defects: []
  expected_evidence:
    - "write_who"
    - "no_opinion"
  expected_confidence: High

scoring:
  verdict_weight: 1.0
  defect_recall_weight: 0.0
  evidence_weight: 0.0
  false_positive_weight: 0.0

scenario_setup_notes: >
  This scenario tests the write_who allow path. The policy engine must be
  invoked with actor_role=implementer. run_deterministic() uses actor_role=tester
  (DEC-EVAL-RUNNER-002), so the shell gate test invokes the policy engine
  directly with the correct actor_role rather than going through run_deterministic.
