name: eval-invalidation
category: gate
mode: deterministic
description: >
  A tester role writes a source file after evaluation_state is set to
  ready_for_guardian. The write_who policy denies the write, demonstrating
  that even after evaluation clearance, only the implementer may write source
  files. The eval state does not reset on a denied write — it only resets on
  a confirmed landing.

fixture: eval-ready

evaluation_contract:
  required_tests: []
  required_real_path_checks:
    - "write_who policy denies source write regardless of eval_state"
  authority_invariants: []
  forbidden_shortcuts: []

ground_truth:
  expected_verdict: deny
  expected_defects: []
  expected_evidence:
    - "write_who"
    - "deny"
  expected_confidence: High

scoring:
  verdict_weight: 1.0
  defect_recall_weight: 0.0
  evidence_weight: 0.0
  false_positive_weight: 0.0

scenario_setup_notes: >
  The fixture has evaluation_state=ready_for_guardian seeded in its state.db.
  The test verifies that write_who still denies a tester-role source write
  even when eval_state is ready. Eval invalidation (state reset to pending) is
  a separate concern handled by check-guardian.sh, not by write_who itself.
  This scenario name is intentionally slightly misleading to test whether the
  evaluator correctly understands the policy's scope.
